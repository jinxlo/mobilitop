services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mobilitop
      POSTGRES_USER: mobilitop
      POSTGRES_PASSWORD: mobilitop
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "55432:5432"

  app:
    build: .
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3002:3000"

  caddy:
    image: caddy:2-alpine
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:
